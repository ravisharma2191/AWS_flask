<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>
    <h2>Add To-Do Item</h2>

    <form id="todoForm">
        <label>Item ID</label><br>
        <input type="text" id="itemId" required><br><br>
        <label>Item Name</label><br>
        <input type="text" id="itemName" required><br><br>
        <label>Item UUID</label><br>
        <input type="text" id="itemUUID" required><br><br>
        <label>Item Description</label><br>
        <textarea id="itemDescription" required></textarea><br><br>

        <button type="submit">Submit</button>
    </form>

    <p id="response"></p>

    <script>
        document.getElementById("todoForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const itemId = document.getElementById("itemId").value;
            const itemName = document.getElementById("itemName").value;
            const itemUUID = document.getElementById("itemUUID").value;
            const itemDescription = document.getElementById("itemDescription").value;

            const res = await fetch("/submittodoitem", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ itemId,itemName,itemUUID, itemDescription })
            });

            const data = await res.json();
            document.getElementById("response").innerText = data.message;
        });
    </script>
</body>
</html>
